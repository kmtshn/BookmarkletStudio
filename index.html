<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarklet Studio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981', // 今回はコードエディタっぽくエメラルドグリーン基調
                        primaryHover: '#059669',
                        dark: '#1e293b',
                    },
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        mono: ['"Fira Code"', '"JetBrains Mono"', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- JS圧縮ライブラリ (Terser) -->
    <script src="https://cdn.jsdelivr.net/npm/terser/dist/bundle.min.js"></script>

    <style>
        body { background-color: #f8fafc; color: #334155; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* エディタの見た目 */
        textarea.code-editor {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background-color: #1e293b;
            color: #e2e8f0;
            line-height: 1.5;
            tab-size: 4;
        }
        
        /* ドラッグできるボタンのアニメーション */
        .drag-button {
            transition: all 0.2s;
            cursor: grab;
        }
        .drag-button:active {
            cursor: grabbing;
            transform: scale(0.98);
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="bg-white border-b sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2 text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                </svg>
                <h1 class="font-bold text-xl tracking-tight text-slate-800">Bookmarklet <span class="text-primary">Studio</span></h1>
            </div>
            <div class="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1.5 rounded-full">
                ブラウザ完結・自動圧縮
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- 左側：エディタ -->
        <div class="lg:col-span-7 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-lg text-slate-800 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        エディタ
                    </h2>
                    <button onclick="clearEditor()" class="text-xs font-bold text-slate-400 hover:text-slate-600 transition-colors">クリア</button>
                </div>
                
                <input type="hidden" id="editId">
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">ツール名</label>
                        <input type="text" id="editTitle" placeholder="例: 要素スクショツール" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all font-bold text-slate-700">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">説明 (任意)</label>
                        <input type="text" id="editDesc" placeholder="何をするツールですか？" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-sm text-slate-600">
                    </div>
                    
                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <label class="block text-xs font-bold text-slate-500">JavaScript コード</label>
                            <span class="text-[10px] text-slate-400">※自動でMinify（圧縮）されます</span>
                        </div>
                        <div class="relative rounded-lg overflow-hidden border border-slate-700 shadow-inner">
                            <div class="absolute top-0 left-0 right-0 h-8 bg-slate-800 flex items-center px-3 gap-1.5 border-b border-slate-700">
                                <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                                <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                                <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                                <span class="ml-2 text-[10px] text-slate-400 font-mono">script.js</span>
                            </div>
                            <textarea id="editCode" rows="12" placeholder="console.log('Hello World!');" class="w-full p-4 pt-10 code-editor outline-none text-sm resize-y" spellcheck="false" oninput="handleCodeInput()"></textarea>
                        </div>
                        <div id="errorMsg" class="hidden mt-2 text-xs font-bold text-red-500 flex items-center">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <span id="errorText">構文エラーがあります</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- プレビュー＆インストールカード -->
            <div class="bg-gradient-to-br from-emerald-50 to-teal-50 p-6 rounded-2xl border border-emerald-100 shadow-sm relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-bl-full -z-0"></div>
                
                <h3 class="font-bold text-emerald-800 mb-4 flex items-center relative z-10">
                    <svg class="w-5 h-5 mr-1.5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    インストール準備完了
                </h3>
                
                <div class="flex flex-col sm:flex-row items-center gap-6 relative z-10">
                    <div class="text-center w-full sm:w-auto">
                        <p class="text-[10px] font-bold text-emerald-600 mb-2">下のボタンをブックマークバーにドラッグ！</p>
                        <a id="previewDragBtn" href="javascript:void(0);" onclick="event.preventDefault(); showToast('ブックマークバー（お気に入りバー）にドラッグ＆ドロップして登録してください');" class="inline-flex items-center justify-center bg-primary hover:bg-primaryHover text-white px-6 py-3 rounded-full font-bold shadow-lg drag-button border-2 border-white/20 select-none pointer-events-none opacity-50 w-full sm:w-auto">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                            <span id="previewBtnText">未入力</span>
                        </a>
                    </div>
                    
                    <div class="flex-1 w-full space-y-2">
                        <div class="flex justify-between items-end">
                            <span class="text-xs font-bold text-slate-500">出力コード (Minified)</span>
                            <button onclick="copyOutputCode()" id="copyBtn" class="text-[10px] font-bold bg-white text-emerald-600 px-2 py-1 rounded shadow-sm border border-emerald-200 hover:bg-emerald-50 transition-colors pointer-events-none opacity-50">コピーする</button>
                        </div>
                        <textarea id="outputCode" readonly class="w-full text-xs font-mono p-3 bg-white/60 border border-emerald-200 rounded-lg outline-none text-slate-600 h-20 resize-none break-all" placeholder="ここに圧縮されたコードが表示されます"></textarea>
                    </div>
                </div>

                <div class="mt-6 pt-5 border-t border-emerald-200/60 flex justify-end">
                    <button onclick="saveBookmarklet()" id="saveBtn" class="bg-slate-800 hover:bg-slate-700 text-white px-8 py-2.5 rounded-xl font-bold shadow-md transition-all flex items-center opacity-50 pointer-events-none">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                        リストに保存
                    </button>
                </div>
            </div>
        </div>

        <!-- 右側：保存済みリスト -->
        <div class="lg:col-span-5">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 h-full overflow-hidden flex flex-col">
                <div class="p-5 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                    <h2 class="font-bold text-slate-800 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                        マイブックマークレット
                    </h2>
                    <span id="listCount" class="text-xs font-bold text-white bg-slate-400 px-2 py-0.5 rounded-full">0</span>
                </div>
                
                <div id="bookmarkletList" class="p-3 overflow-y-auto flex-1 space-y-3 bg-slate-50/50 min-h-[400px]">
                    <!-- リストがここに生成されます -->
                </div>
            </div>
        </div>
    </main>

    <!-- 通知トースト -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] px-6 py-3 bg-slate-800 text-white rounded-full shadow-xl text-sm font-bold opacity-0 transition-all duration-300 pointer-events-none transform translate-y-4"></div>

    <script>
        // ==========================================
        // 初期データと状態管理
        // ==========================================
        const PRESETS = [
            {
                id: 'preset_1',
                title: '📸 要素スクショツール',
                desc: 'ホバーしたHTML要素だけを綺麗に画像化（白背景）',
                code: `// CSPが厳しいサイトでは動作しない場合があります
var d = window.define;
window.define = undefined;
if (window.html2canvas) {
    window.define = d;
    init();
} else {
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload = function() {
        window.define = d;
        if (typeof html2canvas === 'undefined') {
            alert('読込失敗。CSP制限の可能性があります。');
            return;
        }
        init();
    };
    s.onerror = function() { window.define = d; alert('ブロックされました(CSPエラー)。'); };
    document.body.appendChild(s);
}

function init() {
    var st = document.createElement('style');
    st.id = 'bkmk-shot-style';
    st.innerHTML = '.bkmk-hover-target{outline:3px dashed #10b981!important;cursor:crosshair!important;background-color:rgba(16,185,129,0.1)!important;transition:all 0.2s}';
    document.head.appendChild(st);
    
    var a = null;
    var move = function(e) {
        if (a && a !== e.target) a.classList.remove('bkmk-hover-target');
        a = e.target;
        a.classList.add('bkmk-hover-target');
    };
    
    var click = function(e) {
        e.preventDefault(); e.stopPropagation();
        document.removeEventListener('mouseover', move);
        document.removeEventListener('click', click, true);
        if (a) a.classList.remove('bkmk-hover-target');
        var sc = document.getElementById('bkmk-shot-style');
        if (sc) sc.remove();
        
        if (typeof html2canvas === 'undefined') return alert('エラー: html2canvasが見つかりません');
        
        // 背景を白(#ffffff)にしてスクショ
        html2canvas(e.target, { backgroundColor: '#ffffff', scale: 2 }).then(function(c) {
            var l = document.createElement('a');
            l.download = 'element_' + Date.now() + '.png';
            l.href = c.toDataURL('image/png');
            l.click();
        }).catch(function(err) { alert('Error: ' + err); });
    };
    
    document.addEventListener('mouseover', move);
    document.addEventListener('click', click, true);
}`,
                updatedAt: Date.now()
            },
            {
                id: 'preset_2',
                title: '📝 Markdownリンク コピー',
                desc: '現在のページのタイトルとURLをMarkdown形式でクリップボードにコピー',
                code: `// Markdown形式でコピー
const title = document.title;
const url = window.location.href;
const mdLink = \`[\${title}](\${url})\`;

// クリップボードAPIを使用（HTTP等非セキュア環境用フォールバック付）
if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(mdLink).then(() => {
        alert("コピーしました: \\n" + mdLink);
    }).catch(err => {
        alert("コピー失敗: " + err);
    });
} else {
    // 古い手法
    const textArea = document.createElement("textarea");
    textArea.value = mdLink;
    textArea.style.position = "fixed";
    textArea.style.left = "-999999px";
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    try {
        document.execCommand('copy');
        alert("コピーしました: \\n" + mdLink);
    } catch (err) {
        alert("コピー失敗: 手動でコピーしてください\\n" + mdLink);
    }
    textArea.remove();
}`,
                updatedAt: Date.now()
            },
            {
                id: 'preset_3',
                title: '👁️ パスワード表示',
                desc: '画面内のパスワード入力欄(***)をテキストとして表示する',
                code: `// 全てのパスワードフィールドを取得
const passFields = document.querySelectorAll('input[type="password"]');
let count = 0;

passFields.forEach(field => {
    field.type = 'text';
    field.style.backgroundColor = '#fef08a'; // 分かりやすく黄色にハイライト
    field.style.color = '#000';
    count++;
});

if (count > 0) {
    // 3秒後に元に戻す
    setTimeout(() => {
        passFields.forEach(field => {
            field.type = 'password';
            field.style.backgroundColor = '';
            field.style.color = '';
        });
    }, 3000);
} else {
    alert("パスワード入力欄が見つかりませんでした。");
}`,
                updatedAt: Date.now()
            }
        ];

        let bookmarks = [];
        let currentBookmarkletUrl = '';
        let timerId = null;

        // ==========================================
        // UI & ユーティリティ関数
        // ==========================================
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; 
            t.style.opacity = 1;
            t.style.transform = 'translate(-50%, 0)';
            setTimeout(() => {
                t.style.opacity = 0;
                t.style.transform = 'translate(-50%, 16px)';
            }, 3000);
        }

        // ==========================================
        // 初期化処理
        // ==========================================
        window.onload = function() {
            // Terserがロードされているか確認
            if (typeof Terser === 'undefined') {
                console.warn("Terser library is not loaded yet.");
            }
            
            // ローカルストレージからデータを読み込む
            const savedData = localStorage.getItem('bkmk_studio_data');
            if (savedData) {
                try {
                    bookmarks = JSON.parse(savedData);
                } catch (e) {
                    console.error('Data parsing error', e);
                    bookmarks = [...PRESETS];
                }
            } else {
                // 初回アクセス時はプリセットをロード
                bookmarks = [...PRESETS];
                saveToLocalStorage();
            }
            
            renderList();
            
            // エディタの入力変更を監視（タイトル）
            document.getElementById('editTitle').addEventListener('input', updatePreviewUI);
        };

        function saveToLocalStorage() {
            localStorage.setItem('bkmk_studio_data', JSON.stringify(bookmarks));
        }

        // ==========================================
        // コアロジック: JS -> Bookmarklet 変換
        // ==========================================
        async function processCode() {
            const rawCode = document.getElementById('editCode').value;
            const errorMsgEl = document.getElementById('errorMsg');
            const errorTextEl = document.getElementById('errorText');
            
            if (!rawCode.trim()) {
                currentBookmarkletUrl = '';
                errorMsgEl.classList.add('hidden');
                updatePreviewUI();
                return;
            }

            try {
                // Terserを使ってコードを圧縮・最適化
                // 1行にまとめ、不要な空白やコメントを完全除去
                const result = await Terser.minify(rawCode, {
                    compress: {
                        drop_console: false,
                        dead_code: true
                    },
                    format: {
                        comments: false, // 全コメント削除
                        quote_style: 1 // シングルクォートに統一
                    }
                });

                if (result.error) throw result.error;

                errorMsgEl.classList.add('hidden');
                
                // ブックマークレットの形式に組み立ててURIエンコード
                // 実行環境(グローバル汚染)を防ぐため IIFE (即時実行関数) で包む
                const wrappedCode = `(function(){${result.code}})();`;
                currentBookmarkletUrl = 'javascript:' + encodeURIComponent(wrappedCode);
                
                updatePreviewUI();

            } catch (err) {
                // 構文エラーをキャッチしてUIに表示
                console.error(err);
                currentBookmarkletUrl = '';
                errorTextEl.innerText = err.message || '構文エラーがあります';
                errorMsgEl.classList.remove('hidden');
                updatePreviewUI();
            }
        }

        function handleCodeInput() {
            // タイピング中の重い処理を防ぐためDebounce
            clearTimeout(timerId);
            timerId = setTimeout(processCode, 500);
        }

        function updatePreviewUI() {
            const title = document.getElementById('editTitle').value.trim() || '未入力';
            const dragBtn = document.getElementById('previewDragBtn');
            const copyBtn = document.getElementById('copyBtn');
            const saveBtn = document.getElementById('saveBtn');
            const outTextarea = document.getElementById('outputCode');
            const btnText = document.getElementById('previewBtnText');
            
            btnText.innerText = title;
            outTextarea.value = currentBookmarkletUrl;

            // コードが正常に変換されていればボタンを有効化
            if (currentBookmarkletUrl) {
                dragBtn.href = currentBookmarkletUrl;
                dragBtn.classList.remove('opacity-50', 'pointer-events-none');
                dragBtn.classList.add('hover:-translate-y-1', 'cursor-grab');
                dragBtn.title = "このボタンをブックマークバーにドラッグ＆ドロップ";
                
                copyBtn.classList.remove('opacity-50', 'pointer-events-none');
                saveBtn.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                dragBtn.href = "javascript:void(0);";
                dragBtn.classList.add('opacity-50', 'pointer-events-none');
                dragBtn.classList.remove('hover:-translate-y-1', 'cursor-grab');
                dragBtn.title = "";
                
                copyBtn.classList.add('opacity-50', 'pointer-events-none');
                saveBtn.classList.add('opacity-50', 'pointer-events-none');
            }
        }

        function copyOutputCode() {
            const outTextarea = document.getElementById('outputCode');
            outTextarea.select();
            document.execCommand('copy');
            showToast('出力コードをコピーしました');
        }

        // ==========================================
        // CRUD (作成・読み込み・保存・削除)
        // ==========================================
        function clearEditor() {
            document.getElementById('editId').value = '';
            document.getElementById('editTitle').value = '';
            document.getElementById('editDesc').value = '';
            document.getElementById('editCode').value = '';
            currentBookmarkletUrl = '';
            document.getElementById('errorMsg').classList.add('hidden');
            updatePreviewUI();
        }

        function loadItem(id) {
            const item = bookmarks.find(b => b.id === id);
            if (!item) return;
            
            document.getElementById('editId').value = item.id;
            document.getElementById('editTitle').value = item.title;
            document.getElementById('editDesc').value = item.desc || '';
            document.getElementById('editCode').value = item.code;
            
            showToast('エディタに読み込みました');
            // 即座に変換処理を走らせる
            processCode();
            
            // スクロールして上に戻す
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function saveBookmarklet() {
            if (!currentBookmarkletUrl) return;
            
            const idInput = document.getElementById('editId').value;
            const title = document.getElementById('editTitle').value.trim() || '名称未設定';
            const desc = document.getElementById('editDesc').value.trim();
            const code = document.getElementById('editCode').value;
            
            if (idInput) {
                // 更新
                const idx = bookmarks.findIndex(b => b.id === idInput);
                if (idx > -1) {
                    bookmarks[idx].title = title;
                    bookmarks[idx].desc = desc;
                    bookmarks[idx].code = code;
                    bookmarks[idx].updatedAt = Date.now();
                }
            } else {
                // 新規作成
                const newItem = {
                    id: 'bkmk_' + Date.now(),
                    title: title,
                    desc: desc,
                    code: code,
                    updatedAt: Date.now()
                };
                // 先頭に追加
                bookmarks.unshift(newItem);
                document.getElementById('editId').value = newItem.id;
            }
            
            saveToLocalStorage();
            renderList();
            showToast('リストに保存しました');
        }

        function deleteItem(id, event) {
            event.stopPropagation(); // 親要素のクリック(loadItem)を防ぐ
            if (!confirm('このブックマークレットを削除しますか？')) return;
            
            bookmarks = bookmarks.filter(b => b.id !== id);
            saveToLocalStorage();
            renderList();
            
            // 編集中のものを削除した場合はエディタをクリア
            if (document.getElementById('editId').value === id) {
                clearEditor();
            }
            
            showToast('削除しました');
        }

        function renderList() {
            const listEl = document.getElementById('bookmarkletList');
            document.getElementById('listCount').innerText = bookmarks.length;
            
            if (bookmarks.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center py-10 text-slate-400">
                        <svg class="w-12 h-12 mx-auto mb-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        <p class="font-bold text-sm">保存されたアイテムはありません</p>
                        <p class="text-xs mt-1">左のエディタから作成して保存してください</p>
                    </div>`;
                return;
            }
            
            // 更新日時の降順でソート（プリセットなどもあるため）
            const sorted = [...bookmarks].sort((a, b) => b.updatedAt - a.updatedAt);
            
            let html = '';
            sorted.forEach(b => {
                const date = new Date(b.updatedAt);
                const dateStr = `${date.getFullYear()}/${(date.getMonth()+1).toString().padStart(2,'0')}/${date.getDate().toString().padStart(2,'0')}`;
                
                html += `
                <div onclick="loadItem('${b.id}')" class="bg-white border border-slate-200 rounded-xl p-4 cursor-pointer hover:border-primary hover:shadow-md transition-all group fade-in">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-slate-800 text-sm group-hover:text-primary transition-colors">${b.title}</h4>
                        <button onclick="deleteItem('${b.id}', event)" class="text-slate-300 hover:text-red-500 hover:bg-red-50 p-1.5 rounded-md transition-colors" title="削除">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                    <p class="text-xs text-slate-500 mb-3 line-clamp-2 leading-relaxed">${b.desc || '説明なし'}</p>
                    <div class="flex justify-between items-center text-[10px]">
                        <span class="text-slate-400 font-mono bg-slate-100 px-2 py-1 rounded truncate max-w-[150px]">${b.code.substring(0, 30)}...</span>
                        <span class="text-slate-400">${dateStr}</span>
                    </div>
                </div>`;
            });
            
            listEl.innerHTML = html;
        }
    </script>
</body>
</html>
